kind = "mobile"
previewPath = "/"
title = "Telegram Chat UI"
version = "1.0.0"
id = "artifacts/telegram-chat"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20676

[services.development]
run = "pnpm --filter @workspace/telegram-chat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/telegram-chat", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/telegram-chat", "run", "serve" ]

[services.env]
PORT = "20676"
BASE_PATH = "/"
